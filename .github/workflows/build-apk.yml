name: Build APK with EAS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      release_draft:
        description: 'Criar como rascunho (draft)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '9.12.0'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Type check
        run: pnpm check
        continue-on-error: true

      - name: 🚀 Setup EAS CLI
        run: npm install -g eas-cli

      - name: 🏗️ Build APK with EAS
        run: eas build --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download build artifacts
        run: |
          mkdir -p ./build-artifacts
          if [ -d "$HOME/.eas/builds" ]; then
            find $HOME/.eas/builds -name "*.apk" -exec cp {} ./build-artifacts/ \; 2>/dev/null || true
          fi

      - name: 📋 Generate changelog
        id: changelog
        run: |
          {
            echo "## 📱 Build Information"
            echo ""
            echo "- **Data**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "- **Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "- **Branch**: ${{ github.ref }}"
            echo "- **Author**: ${{ github.actor }}"
            echo ""
            echo "### 📝 Últimos commits"
            git log --oneline -10
          } >> CHANGELOG.md
          cat CHANGELOG.md

      - name: 🏷️ Create Release
        if: success() && startsWith(github.ref, 'refs/heads/main')
        uses: softprops/action-gh-release@v1
        with:
          files: ./build-artifacts/*.apk
          tag_name: 'build-${{ github.run_number }}'
          release_name: 'APK Build #${{ github.run_number }}'
          body_path: CHANGELOG.md
          draft: ${{ github.event.inputs.release_draft == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✨ Build Summary
        if: always()
        run: |
          echo "## ✅ Build Pipeline Concluído"
          echo ""
          echo "| Campo | Valor |"
          echo "|-------|-------|"
          echo "| Run ID | ${{ github.run_id }} |"
          echo "| Build # | ${{ github.run_number }} |"
          echo "| Commit | ${{ github.sha }} |"
          echo "| Branch | ${{ github.ref }} |"
          echo "| Status | ${{ job.status }} |"
